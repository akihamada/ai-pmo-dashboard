<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AHA PMO Dashboard — Multi-Month</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#090b10; --surface:rgba(18,22,33,0.85); --surface2:rgba(26,32,48,0.9);
  --glass:rgba(255,255,255,0.03); --glass-border:rgba(255,255,255,0.06);
  --text:#e4e8f1; --dim:#6b7394; --accent:#5b8def;
  --red:#ff6b8a; --green:#4ecdc4; --yellow:#ffbe0b; --purple:#a855f7;
  --cyan:#06b6d4; --orange:#f97316; --blue:#3b82f6;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Noto Sans JP',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(91,141,239,0.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(168,85,247,0.04) 0%,transparent 60%);pointer-events:none;z-index:0}
.wrap{max-width:1480px;margin:0 auto;padding:0 24px;position:relative;z-index:1}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}

.hero{padding:40px 0 24px;text-align:center}
.hero-tag{display:inline-block;padding:4px 14px;border-radius:20px;background:rgba(91,141,239,0.12);color:var(--accent);font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
h1{font-size:2rem;font-weight:800;letter-spacing:-.02em;background:linear-gradient(135deg,#e4e8f1 30%,#8b9fd4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.hero-sub{color:var(--dim);font-size:.85rem;margin-bottom:20px}

/* Month Selector */
.month-selector{display:flex;justify-content:center;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.month-btn{background:var(--surface);border:1px solid var(--glass-border);border-radius:10px;padding:8px 20px;color:var(--dim);font-size:.82rem;font-weight:500;cursor:pointer;transition:all .25s}
.month-btn:hover{border-color:rgba(255,255,255,0.15);color:var(--text)}
.month-btn.active{background:rgba(91,141,239,0.15);border-color:var(--accent);color:var(--accent);font-weight:600}
.month-btn.all-btn{background:rgba(168,85,247,0.1);border-color:rgba(168,85,247,0.3);color:var(--purple)}
.month-btn.all-btn.active{background:rgba(168,85,247,0.2);border-color:var(--purple)}

/* Badges */
.badges{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.badge{background:var(--surface);backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:10px;padding:8px 16px;font-size:.8rem;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:90px}
.badge-val{font-size:1.3rem;font-weight:700;color:#fff}
.badge-label{font-size:.66rem;color:var(--dim);letter-spacing:.04em}

/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:24px;border-bottom:1px solid var(--glass-border);padding-bottom:8px;flex-wrap:wrap}
.tab{padding:6px 16px;border-radius:8px 8px 0 0;font-size:.8rem;font-weight:500;color:var(--dim);cursor:pointer;transition:all .2s;border:none;background:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);background:rgba(91,141,239,0.08);border-bottom:2px solid var(--accent)}

/* Section */
.section{margin-top:32px;display:none}
.section.visible{display:block}
.section-title{font-size:1rem;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-title::before{content:'';width:3px;height:16px;border-radius:2px;background:var(--accent)}

/* Cards */
.card{background:var(--surface);backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:14px;padding:20px;transition:all .3s;margin-bottom:12px}
.card:hover{border-color:rgba(255,255,255,0.1);box-shadow:0 8px 32px rgba(0,0,0,0.3)}

/* Project Grid */
.pj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.pj-card{position:relative;overflow:hidden}
.pj-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:2px}
.pj-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.pj-code{font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.05em}
.pj-name{font-size:.82rem;font-weight:600;color:#fff}
.pj-meta{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
.pj-meta-item{font-size:.7rem;color:var(--dim);background:var(--glass);padding:3px 8px;border-radius:6px;display:flex;align-items:center;gap:4px}
.pj-tasks{margin-top:8px}
.pj-task{font-size:.75rem;color:var(--dim);padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.02)}
.pj-task::before{content:'•';margin-right:6px;color:var(--accent)}

/* Gantt Chart */
.gantt-container{overflow-x:auto;background:var(--surface);border-radius:14px;border:1px solid var(--glass-border);padding:16px}
.gantt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.gantt-header h3{font-size:.9rem;font-weight:600}
.gantt-zoom{display:flex;gap:4px}
.gantt-zoom button{padding:4px 10px;border-radius:6px;border:1px solid var(--glass-border);background:var(--glass);color:var(--dim);font-size:.7rem;cursor:pointer;transition:all .2s}
.gantt-zoom button.active{background:rgba(91,141,239,0.15);border-color:var(--accent);color:var(--accent)}
.gantt-timeline{position:relative;min-height:200px}
.gantt-months-row{display:flex;border-bottom:1px solid var(--glass-border)}
.gantt-month-label{text-align:center;font-size:.7rem;font-weight:600;color:var(--accent);padding:6px 0;border-right:1px solid var(--glass-border)}
.gantt-weeks-row{display:flex;border-bottom:1px solid var(--glass-border)}
.gantt-week-cell{text-align:center;font-size:.62rem;color:var(--dim);padding:4px 0;border-right:1px solid rgba(255,255,255,0.02)}
.gantt-row{display:flex;align-items:center;min-height:28px;border-bottom:1px solid rgba(255,255,255,0.02)}
.gantt-label{width:180px;min-width:180px;font-size:.72rem;padding:4px 8px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-right:1px solid var(--glass-border)}
.gantt-bars{flex:1;position:relative;height:24px}
.gantt-bar{position:absolute;height:16px;top:4px;border-radius:6px;opacity:0.85;transition:all .3s;cursor:pointer}
.gantt-bar:hover{opacity:1;transform:scaleY(1.3);z-index:10}
.gantt-bar .tooltip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);color:#fff;padding:8px 12px;border-radius:8px;font-size:.7rem;white-space:nowrap;z-index:100;pointer-events:none;margin-bottom:4px;border:1px solid var(--glass-border)}
.gantt-bar:hover .tooltip{display:block}

/* Resource / Risk Analysis */
.risk-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.risk-grid{grid-template-columns:1fr}}
.heatmap-table{width:100%;border-collapse:collapse;font-size:.72rem}
.heatmap-table th{background:rgba(91,141,239,0.08);color:var(--accent);padding:6px 8px;text-align:left;border:1px solid var(--glass-border);font-weight:500;position:sticky;top:0}
.heatmap-table td{padding:5px 8px;border:1px solid rgba(255,255,255,0.03);text-align:center}
.heat-0{background:transparent}
.heat-1{background:rgba(78,205,196,0.1)}
.heat-2{background:rgba(255,190,11,0.15)}
.heat-3{background:rgba(255,107,138,0.2)}
.heat-high{background:rgba(255,107,138,0.3);color:var(--red);font-weight:600}

.load-bar{height:8px;border-radius:4px;background:var(--glass);overflow:hidden;margin-top:4px}
.load-fill{height:100%;border-radius:4px;transition:width .5s}

/* Updated Items */
.update-list{max-height:400px;overflow-y:auto}
.update-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:.76rem;transition:background .2s}
.update-item:hover{background:rgba(255,255,255,0.02)}
.update-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0}
.update-canvas{background:rgba(91,141,239,0.15)}
.update-file{background:rgba(78,205,196,0.15)}
.update-pin{background:rgba(255,190,11,0.15)}
.update-date{color:var(--dim);font-size:.66rem;margin-left:auto;white-space:nowrap}

/* Summary Cards */
.summary-box{background:rgba(91,141,239,0.05);border:1px solid rgba(91,141,239,0.15);border-radius:10px;padding:14px;margin-bottom:12px}
.summary-box h4{font-size:.82rem;font-weight:600;color:var(--accent);margin-bottom:6px}
.summary-text{font-size:.76rem;color:var(--dim);line-height:1.5}
.alert-red{border-color:rgba(255,107,138,0.3);background:rgba(255,107,138,0.05)}
.alert-red h4{color:var(--red)}

@media(max-width:768px){
  .pj-grid{grid-template-columns:1fr}
  .risk-grid{grid-template-columns:1fr}
  .gantt-label{width:120px;min-width:120px}
}
</style>
</head>
<body>

<div class="wrap">
  <div class="hero">
    <div class="hero-tag">AI-Powered Project Management</div>
    <h1>AHA PMO Dashboard</h1>
    <p class="hero-sub">Slack 全チャンネル分析 — Multi-Month View</p>
    
    <div class="month-selector" id="monthSelector"></div>
    <div class="badges" id="badges"></div>
  </div>

  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="overview" id="tab-overview">📊 Overview</div>
    <div class="tab" data-tab="gantt" id="tab-gantt">📅 ガントチャート</div>
    <div class="tab" data-tab="risk" id="tab-risk">⚠️ リスク分析</div>
    <div class="tab" data-tab="members" id="tab-members">👥 リソース</div>
    <div class="tab" data-tab="updates" id="tab-updates">🔄 更新履歴</div>
  </div>

  <!-- Overview -->
  <div class="section visible" id="section-overview">
    <div class="section-title">プロジェクト一覧</div>
    <div class="pj-grid" id="pjGrid"></div>
  </div>

  <!-- Gantt -->
  <div class="section" id="section-gantt">
    <div class="gantt-container">
      <div class="gantt-header">
        <h3>📅 プロジェクトタイムライン</h3>
        <div class="gantt-zoom">
          <button data-zoom="month" class="active">月表示</button>
          <button data-zoom="quarter">3ヶ月</button>
        </div>
      </div>
      <div class="gantt-timeline" id="ganttTimeline"></div>
    </div>
  </div>

  <!-- Risk -->
  <div class="section" id="section-risk">
    <div class="section-title">クロスプロジェクト リスク分析</div>
    <div class="risk-grid">
      <div class="card">
        <h4 style="font-size:.85rem;margin-bottom:12px;color:var(--yellow)">📆 マイルストーン重なりチェック</h4>
        <div id="milestoneOverlap"></div>
      </div>
      <div class="card">
        <h4 style="font-size:.85rem;margin-bottom:12px;color:var(--red)">👥 担当者オーバーラップ</h4>
        <div id="assigneeOverlap"></div>
      </div>
    </div>
    <div class="card" style="margin-top:14px">
      <h4 style="font-size:.85rem;margin-bottom:12px;color:var(--accent)">📊 週別タスク集中度ヒートマップ</h4>
      <div style="overflow-x:auto" id="weeklyHeatmap"></div>
    </div>
  </div>

  <!-- Members -->
  <div class="section" id="section-members">
    <div class="section-title">メンバー別リソース分析</div>
    <div id="memberCards" class="pj-grid"></div>
  </div>

  <!-- Updates -->
  <div class="section" id="section-updates">
    <div class="section-title">Canvas・ファイル更新履歴</div>
    <div class="card">
      <div class="update-list" id="updateList"></div>
    </div>
  </div>
</div>

let currentMonth = '2026-03';
let currentTab = 'overview';

// =============================================
// Init
// =============================================
function init() {
  renderMonthSelector();
  renderTabs();
  renderAll();
}

function renderMonthSelector() {
  const sel = document.getElementById('monthSelector');
  const months = Object.keys(D.months).sort();
  const monthNames = {'2026-01':'1月','2026-02':'2月','2026-03':'3月'};
  
  let html = '<button class="month-btn all-btn" data-month="all">全期間</button>';
  months.forEach(m => {
    const active = m === currentMonth ? 'active' : '';
    html += `<button class="month-btn ${active}" data-month="${m}">2026年${monthNames[m] || m}</button>`;
  });
  sel.innerHTML = html;
  
  sel.querySelectorAll('.month-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentMonth = btn.dataset.month;
      sel.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderAll();
    });
  });
}

function renderTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
      tab.classList.add('active');
      currentTab = tab.dataset.tab;
      document.getElementById('section-' + currentTab).classList.add('visible');
      if (currentTab === 'gantt') renderGantt();
      if (currentTab === 'risk') renderRisk();
      if (currentTab === 'members') renderMembers();
      if (currentTab === 'updates') renderUpdates();
    });
  });
}

function getMonthData() {
  if (currentMonth === 'all') {
    const merged = {projects: [], project_count: 0, total_tasks: 0};
    const pjMap = {};
    Object.values(D.months).forEach(md => {
      md.projects.forEach(pj => {
        if (!pjMap[pj.code]) {
          pjMap[pj.code] = {...pj, tasks: [...pj.tasks], assignees: [...pj.assignees], weeks: [...pj.weeks], dates: [...pj.dates]};
        } else {
          const e = pjMap[pj.code];
          pj.tasks.forEach(t => { if (!e.tasks.includes(t)) e.tasks.push(t); });
          pj.assignees.forEach(a => { if (!e.assignees.includes(a)) e.assignees.push(a); });
          pj.weeks.forEach(w => { if (!e.weeks.includes(w)) e.weeks.push(w); });
          pj.dates.forEach(d => { if (!e.dates.includes(d)) e.dates.push(d); });
          e.task_count = e.tasks.length;
        }
      });
    });
    merged.projects = Object.values(pjMap).sort((a,b) => b.task_count - a.task_count);
    merged.project_count = merged.projects.length;
    merged.total_tasks = merged.projects.reduce((s,p) => s + p.task_count, 0);
    return merged;
  }
  return D.months[currentMonth] || {projects:[], project_count:0, total_tasks:0};
}

// =============================================
// Render All
// =============================================
function renderAll() {
  const md = getMonthData();
  renderBadges(md);
  renderProjects(md);
  if (currentTab === 'gantt') renderGantt();
  if (currentTab === 'risk') renderRisk();
  if (currentTab === 'members') renderMembers();
  if (currentTab === 'updates') renderUpdates();
}

function renderBadges(md) {
  const totalAssignees = new Set();
  md.projects.forEach(p => p.assignees.forEach(a => totalAssignees.add(a)));
  document.getElementById('badges').innerHTML = `
    <div class="badge"><span class="badge-val">${md.project_count}</span><span class="badge-label">Projects</span></div>
    <div class="badge"><span class="badge-val">${md.total_tasks}</span><span class="badge-label">Total Tasks</span></div>
    <div class="badge"><span class="badge-val">${totalAssignees.size}</span><span class="badge-label">Members</span></div>
    <div class="badge"><span class="badge-val">${md.projects.filter(p=>p.task_count>15).length}</span><span class="badge-label">Heavy PJ</span></div>
  `;
}

function renderProjects(md) {
  const grid = document.getElementById('pjGrid');
  grid.innerHTML = md.projects.filter(p=>p.code!=='UNTITL'&&p.name!=='\u7121\u984c').map(pj => {
    const taskHtml = pj.tasks.slice(0,5).map(t => `<div class="pj-task">${t.substring(0,60)}</div>`).join('');
    const assigneeHtml = pj.assignees.length > 0

      <div class="pj-meta">${assigneeHtml}<span class="pj-meta-item">📅 ${weekCount}週</span></div>
      ${pj.schedule ? `<div style="font-size:.72rem;color:var(--cyan);margin:6px 0;padding:4px 8px;background:rgba(6,182,212,0.05);border-radius:6px">📋 ${pj.schedule.substring(0,100)}</div>` : ''}

  }).join('');
}

// =============================================
// Gantt Chart
// =============================================
function renderGantt() {
  const container = document.getElementById('ganttTimeline');
  const allMonths = Object.keys(D.months).sort();
  const isQuarter = currentMonth === 'all';
  
  const months = isQuarter || currentMonth === 'all' ? allMonths : [currentMonth];
  
  // Build weeks for shown months
  const allWeeks = [];
  months.forEach(m => {
    const [y, mo] = m.split('-').map(Number);
    const daysInMonth = new Date(y, mo, 0).getDate();
    for (let w = 1; w <= daysInMonth; w += 7) {
      const endDay = Math.min(w + 6, daysInMonth);
      allWeeks.push({
        month: m,
        label: `${mo}/${w}`,
        start: `${m}-${String(w).padStart(2,'0')}`,
        end: `${m}-${String(endDay).padStart(2,'0')}`,
      });
    }
  });
  
  const cellW = isQuarter ? 60 : 80;
  const totalW = allWeeks.length * cellW;
  
  // Get projects
  const md = getMonthData();
  const projects = md.projects.filter(p=>p.code!=='UNTITL'&&p.name!=='\u7121\u984c');
  
  // Month headers
  let monthHeaderHtml = '';
  const monthGroups = {};
  allWeeks.forEach((w,i) => {
    if (!monthGroups[w.month]) monthGroups[w.month] = {start: i, count: 0};
    monthGroups[w.month].count++;
  });
  const monthNames = {'2026-01':'1月','2026-02':'2月','2026-03':'3月'};
  Object.entries(monthGroups).forEach(([m, g]) => {
    monthHeaderHtml += `<div class="gantt-month-label" style="width:${g.count * cellW}px">${monthNames[m] || m}</div>`;
  });
  
  // Week headers
  let weekHeaderHtml = '';
  allWeeks.forEach(w => {
    weekHeaderHtml += `<div class="gantt-week-cell" style="width:${cellW}px">${w.label}</div>`;
  });
  
  // Rows
  let rowsHtml = '';
  projects.forEach(pj => {
    const activeWeeks = pj.weeks.filter(w => w);
    if (activeWeeks.length === 0) return;
    
    rowsHtml += `<div class="gantt-row">
      <div class="gantt-label" title="${pj.name}" style="border-left:3px solid ${pj.color}">${pj.code}</div>
      <div class="gantt-bars" style="width:${totalW}px">`;
    
    // Find bar positions
    activeWeeks.sort();
    const firstWeek = activeWeeks[0];
    const lastWeek = activeWeeks[activeWeeks.length - 1];
    
    let startIdx = allWeeks.findIndex(w => firstWeek >= w.start && firstWeek <= w.end);
    let endIdx = allWeeks.findIndex(w => lastWeek >= w.start && lastWeek <= w.end);
    if (startIdx < 0) startIdx = 0;
    if (endIdx < 0) endIdx = allWeeks.length - 1;
    
    const left = startIdx * cellW;
    const width = (endIdx - startIdx + 1) * cellW - 4;
    
    rowsHtml += `<div class="gantt-bar" style="left:${left}px;width:${width}px;background:${pj.color}">
      <div class="tooltip">${pj.name}<br>担当: ${pj.assignees.join(', ') || '未設定'}<br>タスク: ${pj.task_count}件<br>期間: ${firstWeek} ~ ${lastWeek}</div>
    </div>`;
    
    rowsHtml += `</div></div>`;
  });
  
  container.innerHTML = `
    <div style="overflow-x:auto">
      <div style="min-width:${180 + totalW}px">
        <div class="gantt-row">
          <div class="gantt-label" style="font-weight:600;color:var(--accent)">Project</div>
          <div style="display:flex">${monthHeaderHtml}</div>
        </div>
        <div class="gantt-row">
          <div class="gantt-label"></div>
          <div style="display:flex">${weekHeaderHtml}</div>
        </div>
        ${rowsHtml}
      </div>
    </div>
  `;
  
  // Zoom buttons
  document.querySelectorAll('.gantt-zoom button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.gantt-zoom button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (btn.dataset.zoom === 'quarter') {
        currentMonth = 'all';
        document.querySelectorAll('.month-btn').forEach(b => {
          b.classList.remove('active');
          if (b.dataset.month === 'all') b.classList.add('active');
        });
      }
      renderAll();
    });
  });
}

// =============================================
// Risk Analysis
// =============================================
function renderRisk() {
  // Milestone overlap
  const md = getMonthData();
  const dateMap = {};
  md.projects.forEach(pj => {
    pj.dates.forEach(d => {
      if (!dateMap[d]) dateMap[d] = [];
      dateMap[d].push(pj.code);
    });
  });
  
  const overlaps = Object.entries(dateMap)
    .filter(([d, pjs]) => pjs.length >= 2)
    .sort((a,b) => b[1].length - a[1].length);
  
  const overlapEl = document.getElementById('milestoneOverlap');
  if (overlaps.length === 0) {
    overlapEl.innerHTML = '<p style="font-size:.76rem;color:var(--green)">✅ 重なりなし</p>';
  } else {
    overlapEl.innerHTML = overlaps.slice(0, 10).map(([d, pjs]) => {
      const level = pjs.length >= 3 ? 'alert-red' : '';
      return `<div class="summary-box ${level}" style="padding:10px;margin-bottom:8px">
        <h4>${d} — ${pjs.length}PJ重なり${pjs.length >= 3 ? ' ⚠️' : ''}</h4>
        <div class="summary-text">${pjs.join(', ')}</div>
      </div>`;
    }).join('');
  }
  
  // Assignee overlap
  const assigneeEl = document.getElementById('assigneeOverlap');
  const assigneePjs = {};
  md.projects.forEach(pj => {
    pj.assignees.forEach(a => {
      if (!assigneePjs[a]) assigneePjs[a] = [];
      assigneePjs[a].push(pj.code);
    });
  });
  
  const overloaded = Object.entries(assigneePjs)
    .filter(([a, pjs]) => pjs.length >= 2)
    .sort((a,b) => b[1].length - a[1].length);
  
  if (overloaded.length === 0) {
    assigneeEl.innerHTML = '<p style="font-size:.76rem;color:var(--green)">✅ オーバーラップなし</p>';
  } else {
    assigneeEl.innerHTML = overloaded.map(([name, pjs]) => {
      const loadPct = Math.min(100, pjs.length * 33);
      const color = pjs.length >= 3 ? 'var(--red)' : pjs.length >= 2 ? 'var(--yellow)' : 'var(--green)';
      return `<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:.78rem;font-weight:500">👤 ${name}</span>
          <span style="font-size:.68rem;color:${color}">${pjs.length} PJ</span>
        </div>
        <div class="load-bar"><div class="load-fill" style="width:${loadPct}%;background:${color}"></div></div>
        <div style="font-size:.68rem;color:var(--dim);margin-top:2px">${pjs.join(' → ')}</div>
      </div>`;
    }).join('');
  }
  
  // Weekly heatmap
  renderWeeklyHeatmap();
}

function renderWeeklyHeatmap() {
  const projects = [];
  Object.values(D.months).forEach(md => {
    md.projects.forEach(pj => {
      if (pj.code !== 'UNTITL' && pj.name !== '\u7121\u984c') projects.push(pj);
    });
  });
  
  // Get all weeks
  const allWeeks = new Set();
  projects.forEach(pj => pj.weeks.forEach(w => { if (w) allWeeks.add(w); }));
  const weeks = [...allWeeks].sort();
  
  // Get unique PJ codes
  const pjCodes = [...new Set(projects.map(p => p.code))].sort();
  
  // Build matrix
  const matrix = {};
  pjCodes.forEach(code => {
    matrix[code] = {};
    weeks.forEach(w => matrix[code][w] = 0);
  });
  projects.forEach(pj => {
    pj.weeks.forEach(w => {
      if (w && matrix[pj.code]) matrix[pj.code][w] = (matrix[pj.code][w] || 0) + 1;
    });
  });
  
  let html = '<table class="heatmap-table"><thead><tr><th>PJ</th>';
  weeks.forEach(w => {
    const parts = w.split('-');
    html += `<th>${parseInt(parts[1])}/${parseInt(parts[2])}</th>`;
  });
  html += '</tr></thead><tbody>';
  
  pjCodes.forEach(code => {
    html += `<tr><td style="text-align:left;font-weight:500">${code}</td>`;
    weeks.forEach(w => {
      const v = matrix[code][w] || 0;
      const cls = v >= 3 ? 'heat-high' : v >= 2 ? 'heat-3' : v >= 1 ? 'heat-1' : 'heat-0';
      html += `<td class="${cls}">${v > 0 ? '●' : ''}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>';
  
  document.getElementById('weeklyHeatmap').innerHTML = html;
}

      pj.assignees.forEach(a => {
        if (!assigneeData[a]) assigneeData[a] = {projects: {}, totalTasks: 0, months: new Set()};
        if (!assigneeData[a].projects[pj.code]) assigneeData[a].projects[pj.code] = {name: pj.name, months: [], tasks: 0, color: pj.color};
        assigneeData[a].projects[pj.code].months.push(month);
        assigneeData[a].projects[pj.code].tasks += pj.task_count;
        assigneeData[a].totalTasks += pj.task_count;
        assigneeData[a].months.add(month);
      });
    });
  });
  
  container.innerHTML = Object.entries(assigneeData)
    .sort((a,b) => b[1].totalTasks - a[1].totalTasks)
    .map(([name, data]) => {
      const pjList = Object.entries(data.projects)
        .sort((a,b) => b[1].tasks - a[1].tasks)
        .map(([code, pj]) => `<div class="pj-task" style="border-left:2px solid ${pj.color};padding-left:8px">${code}: ${pj.name.split('/')[1] || pj.name} (${pj.tasks} tasks)</div>`)
        .join('');
      const loadPct = Math.min(100, Object.keys(data.projects).length * 25);
      const color = Object.keys(data.projects).length >= 4 ? 'var(--red)' : 
                     Object.keys(data.projects).length >= 2 ? 'var(--yellow)' : 'var(--green)';
      return `<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-size:.88rem;font-weight:600">👤 ${name}</span>
          <span style="font-size:.7rem;padding:3px 8px;border-radius:6px;background:rgba(91,141,239,0.1);color:var(--accent)">${Object.keys(data.projects).length} PJ</span>
        </div>
        <div class="load-bar" style="margin-bottom:10px"><div class="load-fill" style="width:${loadPct}%;background:${color}"></div></div>
        <div>${pjList}</div>
      </div>`;
    }).join('');
}

// =============================================
// Updates
// =============================================
function renderUpdates() {
  const container = document.getElementById('updateList');
  const updates = [];
  
  Object.entries(D.months).forEach(([month, md]) => {
    md.projects.forEach(pj => {
      pj.weeks.forEach(w => {
        if (w) updates.push({
          date: w,
          type: 'canvas',
          project: pj.code,
          name: pj.name,
          color: pj.color,
        });
      });
    });
  });
  
  updates.sort((a,b) => b.date.localeCompare(a.date));
  
  container.innerHTML = updates.slice(0, 80).map(u => {
    const iconCls = u.type === 'canvas' ? 'update-canvas' : u.type === 'file' ? 'update-file' : 'update-pin';
    const icon = u.type === 'canvas' ? '📝' : u.type === 'file' ? '📎' : '📌';
    return `<div class="update-item">
      <div class="update-icon ${iconCls}">${icon}</div>
      <div>
        <div style="font-weight:500">${u.project} — Canvas更新</div>
        <div style="font-size:.68rem;color:var(--dim)">${u.name}</div>
      </div>
      <span class="update-date">${u.date}</span>
    </div>`;
  }).join('');
}

// Init
init();
</script>
